<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Threat Detection</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }

        input, select {
            padding: 10px;
            margin: 10px;
            width: 220px;
            border-radius: 5px;
            border: none;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #16a34a;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🚀 Cyber Threat Detection System</h1>

    <form action="/predict" method="post">

        <label for="packet_size">Packet Size</label>
        <input type="number" id="packet_size" name="packet_size" required>

        <label for="duration">Duration</label>
        <input type="number" id="duration" name="duration" required>

        <label for="protocol">Protocol</label>
        <select id="protocol" name="protocol">
            <option value="TCP">TCP</option>
            <option value="UDP">UDP</option>
            <option value="ICMP">ICMP</option>
        </select>

        <label for="flag">Flag</label>
        <select id="flag" name="flag">
            <option value="SF">SF</option>
            <option value="REJ">REJ</option>
        </select>

        <br><br>
        <button type="submit">Detect</button>
    </form>

    {% if prediction %}
        <div class="result">{{ prediction }}</div>
    {% endif %}

</body>
</html>
